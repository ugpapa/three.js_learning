<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='16' fill='%2307101c'/%3E%3Cpath d='M16 6l7 6v8l-7 6-7-6v-8z' fill='%23f59e0b'/%3E%3C/svg%3E"
    />
    <title>Dragon Animation Showcase</title>
    <script type="module" crossorigin src="./assets/index-6713e607.js"></script>
    <link rel="modulepreload" crossorigin href="./assets/three-vendor-b8bea0cf.js">
    <link rel="stylesheet" href="./assets/index-b5fb7df7.css">
  <link rel="stylesheet" href="/three.js_learning/shared/example-nav.css" />
</head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="topbar-brand">
          <p class="eyebrow">Chapter 4</p>
          <h1>게임용 드래곤 애니메이션 쇼케이스</h1>
        </div>

        <div class="topbar-controls">
          <div class="field action-field" aria-label="드래곤 애니메이션 선택">
            <span>애니메이션</span>
            <div class="action-group">
              <button
                type="button"
                class="action-button is-active"
                data-action="idle"
              >
                멈춤
              </button>
              <button type="button" class="action-button" data-action="walk">
                걷기
              </button>
              <button type="button" class="action-button" data-action="run">
                달리기
              </button>
              <button type="button" class="action-button" data-action="fly">
                비행
              </button>
            </div>
          </div>

          <button
            type="button"
            class="toggle-button is-active"
            data-toggle="autorotate"
          >
            자동 회전
          </button>
        </div>
      </header>

      <main class="stage-shell">
        <section class="stage-card">
          <canvas
            id="three-canvas"
            tabindex="0"
            aria-label="Dragon animation showcase"
          ></canvas>

          <div class="overlay-card intro-card">
            <span>ANIMATION STACK</span>
            <p>
              실시간 게임 자산을 불러와 멈춤, 걷기, 달리기, 비행 클립을 한
              장면에서 비교하는 4장 최종 예제입니다.
            </p>
            <p class="control-copy">
              `W` 걷기, `Shift + W` 또는 `마우스 왼쪽 + W` 달리기, `S` 뒤로
              걷기, `W + A/D` 선회, `가운데 클릭` 비행
            </p>
          </div>

          <div class="overlay-card state-card">
            <p class="info-label">현재 동작</p>
            <h2 id="current-action-title">멈춤</h2>
            <p id="current-action-body">
              기본 대기 자세입니다. 이 상태에서는 모델의 실루엣과 텍스처,
              조명 반응을 가장 안정적으로 확인할 수 있습니다.
            </p>
          </div>
        </section>
      </main>
    </div>

    
  <script src="/three.js_learning/shared/example-nav.js" data-example-nav="true" data-site-root="/three.js_learning"></script>
</body>
</html>
