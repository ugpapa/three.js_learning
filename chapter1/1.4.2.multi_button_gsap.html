<!-- @format -->

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Three sample</title>
    <style>
      body {
        margin: 0;
        height: 100vh;
        box-sizing: border-box;
      }
      #three {
        width: 100%;
        height: 100vh;
        display: block;
      }
      button.play,
      button.reset {
        width: 100px;
        height: 40px;
        margin: 0 10px;
        border: 1px solid white;
        border-radius: 10px;
        background-color: black;
        color: white;
        cursor: pointer;
      }

      .btngroup {
        position: absolute;
        width: 100%;
        z-index: 100;
        top: 10%;
        /* text-align: center; */
        display: flex;
        justify-content: center;
        align-items: center;
      }
    </style>
  <link rel="stylesheet" href="/three.js_learning/shared/example-nav.css" />
</head>
  <body>
    <div class="btngroup">
      <button class="play">낙하</button>
      <button class="reset">초기화</button>
    </div>
    <canvas id="three"></canvas>
    <script
      defer
      src="https://ga.jspm.io/npm:es-module-shims@1.6.2/dist/es-module-shims.js"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.11.4/dist/gsap.js"></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.147.0/build/three.module.js",
          "three/examples/jsm/": "https://unpkg.com/three@0.147.0/examples/jsm/"
        }
      }
    </script>
    <script type="module">
      /** @format */

      import * as THREE from "three";
      import { OrbitControls } from "three/examples/jsm/controls/OrbitControls";

      const scene = new THREE.Scene();
      const canvas = document.querySelector("#three");
      const camera = new THREE.PerspectiveCamera(
        75,
        window.innerWidth / window.innerHeight,
        0.1,
        1000
      );

      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;

      const ballBox = [];
      let amount = 5;
      for (let z = 0; z < amount; z++) {
        for (let y = 0; y < amount; y++) {
          for (let x = 0; x < amount; x++) {
            const geometry = new THREE.SphereGeometry(0.25, 32, 16);
            const color = THREE.MathUtils.randInt(0, 0xffffff);
            const material = new THREE.MeshPhongMaterial({ color });
            const ball = new THREE.Mesh(geometry, material);
            ball.position.set(
              Math.random() + x,
              Math.random() + y,
              Math.random() + z
            );

            ball.castShadow = true; //default is false
            ball.receiveShadow = false; //default
            scene.add(ball);
            ballBox.push(ball);
          }
        }
      }
      const flatGeometry = new THREE.PlaneGeometry(10, 10);
      const flatMaterial = new THREE.MeshStandardMaterial({
        color: 0xfffff,
        side: THREE.DoubleSide,
      });
      const flat = new THREE.Mesh(flatGeometry, flatMaterial);
      flat.position.set(2, -1.5, 2);
      flat.rotation.x = Math.PI / 2;
      flat.receiveShadow = true;
      scene.add(flat);

      camera.position.set(6, 6, 6);

      const ambientLight = new THREE.AmbientLight(0xffffff, 0.75);
      scene.add(ambientLight);

      const light = new THREE.DirectionalLight(0xffffff, 0.5);
      light.position.set(5, 5, 0);
      light.castShadow = true;
      scene.add(light);

      const controls = new OrbitControls(camera, renderer.domElement);

      const axesHelper = new THREE.AxesHelper(5);
      scene.add(axesHelper);

      const clock = new THREE.Clock();
      let time = 0;
      let delta = 0;

      function onClick() {
        ballBox.forEach((ball) => {
          gsap.to(ball.position, {
            duration: 2.5,
            ease: "bounce.out",
            y: -1.25,
          });
        });
      }

      function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
      }

      animate();

      function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      }

      window.addEventListener("resize", onWindowResize);

      const btn = document.querySelector("button.play");
      btn.addEventListener("click", onClick, false);

      const resetBtn = document.querySelector("button.reset");
      resetBtn.addEventListener("click", function () {
        window.location.reload();
      });
      
    </script>
  <script src="/three.js_learning/shared/example-nav.js" data-example-nav="true" data-site-root="/three.js_learning"></script>
</body>
</html>
