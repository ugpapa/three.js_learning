<!-- @format -->

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Three sample</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100vh;
        overflow: hidden;
      }
      canvas {
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <canvas id="three"></canvas>
    <script
      defer
      src="https://ga.jspm.io/npm:es-module-shims@1.6.2/dist/es-module-shims.js"
    ></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.147.0/build/three.module.js",
          "three/examples/jsm/": "https://unpkg.com/three@0.147.0/examples/jsm/"
        }
      }
    </script>
    <script type="module">
      import * as THREE from "three";
      import Stats from "three/examples/jsm/libs/stats.module";
      // import { OrbitControls } from "three/examples/jsm/controls/OrbitControls";

      const scene = new THREE.Scene();
      const canvas = document.querySelector("#three");
      const camera = new THREE.PerspectiveCamera(
        75,
        window.innerWidth / window.innerHeight,
        0.1,
        1000
      );

      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;

      const loader = new THREE.TextureLoader();

      const ballGeometry = new THREE.SphereGeometry(0.5, 32, 16);
      const ballMaterial = new THREE.MeshPhongMaterial({
        color: "white",
        map: loader.load("./textures/earth.jpg"),
      });
      const ball = new THREE.Mesh(ballGeometry, ballMaterial);
      ball.position.set(0, 0, 0);
      ball.castShadow = true; //default is false
      ball.receiveShadow = false; //default
      scene.add(ball);

      const flatGeometry = new THREE.PlaneGeometry(5, 5);
      const flatMaterial = new THREE.MeshStandardMaterial({
        map: loader.load("./textures/wallpaper2.jpg"),
        side: THREE.DoubleSide,
      });
      const flat = new THREE.Mesh(flatGeometry, flatMaterial);
      flat.position.set(0, 0, 0);
      flat.rotation.x = Math.PI / 2;
      flat.receiveShadow = true;
      scene.add(flat);

      const ambientLight = new THREE.AmbientLight(0xffffff, 0.75);
      scene.add(ambientLight);

      const light = new THREE.DirectionalLight(0xffffff, 0.5);
      light.position.set(5, 5, 0);
      light.castShadow = true;
      scene.add(light);

      // const controls = new OrbitControls(camera, renderer.domElement);

      const clock = new THREE.Clock();
      let time = 0;
      let delta = 0;

      const stats = Stats();
      document.body.appendChild(stats.dom);

      // camera.position.set(3, 3, 3);
      const camera_offset = { x: 3, y: 3, z: 3 };
      const camera_speed = 0.5;

      function animate() {
        delta = clock.getDelta();
        time += delta;
        ball.position.y = 0.25 + Math.abs(Math.cos(time * 1)) * 2;
        requestAnimationFrame(animate);
        camera.position.x = camera_offset.x * Math.cos(time * camera_speed);
        // console.log(camera_offset.x * Math.sin(time * camera_speed));
        // console.log(camera_offset.x * Math.cos(time * camera_speed));
        camera.position.z = camera_offset.z * Math.sin(time * camera_speed);
        camera.position.y = camera_offset.y;
        camera.lookAt(flat.position.x, flat.position.y, flat.position.z);
        // controls.update();
        renderer.render(scene, camera);
        stats.update();
      }

      animate();

      function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      }

      window.addEventListener("resize", onWindowResize);
    </script>
  </body>
</html>
