<!-- @format -->

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Three sample</title>
    <style>
      body {
        margin: 0;
        height: 100vh;
        box-sizing: border-box;
      }
      #three {
        width: 100%;
        height: 100vh;
        display: block;
      }
    </style>
  <link rel="stylesheet" href="/three.js_learning/shared/example-nav.css" />
</head>
  <body>
    <canvas id="three"></canvas>
    <script
      defer
      src="https://ga.jspm.io/npm:es-module-shims@1.6.2/dist/es-module-shims.js"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.11.4/dist/gsap.js"></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.147.0/build/three.module.js",
          "three/examples/jsm/": "https://unpkg.com/three@0.147.0/examples/jsm/"
        }
      }
    </script>
    <script type="module">
      /** @format */

      import * as THREE from "three";
      import { OrbitControls } from "three/examples/jsm/controls/OrbitControls";

      const scene = new THREE.Scene();
      const canvas = document.querySelector("#three");
      const camera = new THREE.PerspectiveCamera(
        75,
        window.innerWidth / window.innerHeight,
        0.1,
        1000
      );

      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);

      const particleGeometry = new THREE.BufferGeometry();

      const count = 20000;

      const positions = new Float32Array(count * 3);
      const colors = new Float32Array(count * 3);

      for (let i = 0; i < count * 3; i++) {
        positions[i] = (Math.random() - 0.5) * 10;
        colors[i] = Math.random();
      }

      particleGeometry.setAttribute(
        "position",
        new THREE.BufferAttribute(positions, 3)
      );
      particleGeometry.setAttribute(
        "color",
        new THREE.BufferAttribute(colors, 3)
      );
      const textureLoader = new THREE.TextureLoader();
      const particleTexture = textureLoader.load("./textures/cross.png");
      // const particleTexture = textureLoader.load("/textures/particles/2.png");

      const particleMaterial = new THREE.PointsMaterial();
      particleMaterial.size = 0.1;
      particleMaterial.color = new THREE.Color("lightblue");
      particleMaterial.map = particleTexture;
      particleMaterial.transparent = true;
      particleMaterial.depthWrite = false;
      particleMaterial.vertexColors = true;
      // particleMaterial.blending = THREE.NoBlending;
      // particleMaterial.blending = THREE.NormalBlending;
      // particleMaterial.blending = THREE.SubtractiveBlending;
      // particleMaterial.blending = THREE.MultiplyBlending;
      particleMaterial.blending = THREE.AdditiveBlending;
      const particle = new THREE.Points(particleGeometry, particleMaterial);

      scene.add(particle);

      // make simple sphere
      // const sphereGeometry = new THREE.SphereGeometry(1, 32, 32);
      // const sphereMaterial = new THREE.MeshBasicMaterial({
      //   color: "red",
      // });
      // const sphere = new THREE.Mesh(sphereGeometry, sphereMaterial);
      // scene.add(sphere);

      camera.position.set(3, 3, 3);

      const controls = new OrbitControls(camera, renderer.domElement);
      const clock = new THREE.Clock();

      function animate() {
        requestAnimationFrame(animate);
        const elapsed = clock.getElapsedTime();

        particle.rotation.y = elapsed * 0.02;
        particle.rotation.x = elapsed * 0.01;

        controls.update();
        renderer.render(scene, camera);
      }

      animate();

      function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      }
      window.addEventListener("resize", onWindowResize);
    </script>
  <script src="/three.js_learning/shared/example-nav.js" data-example-nav="true" data-site-root="/three.js_learning"></script>
</body>
</html>
