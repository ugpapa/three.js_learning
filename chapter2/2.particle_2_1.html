<!-- @format -->

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Three sample</title>
    <style>
      body {
        margin: 0;
        height: 100vh;
        box-sizing: border-box;
      }
      #three {
        width: 100%;
        height: 100vh;
        display: block;
      }
    </style>
  </head>
  <body>
    <canvas id="three"></canvas>
    <script
      defer
      src="https://ga.jspm.io/npm:es-module-shims@1.6.2/dist/es-module-shims.js"
    ></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.147.0/build/three.module.js",
          "three/examples/jsm/": "https://unpkg.com/three@0.147.0/examples/jsm/",
          "lil-gui": "https://unpkg.com/lil-gui@0.16.1/dist/lil-gui.esm.js"
        }
      }
    </script>
    <script type="module">
      /** @format */

      import * as THREE from "three";
      import { OrbitControls } from "three/examples/jsm/controls/OrbitControls";
      import * as dat from "lil-gui";

      // console.log(dat);
      const scene = new THREE.Scene();
      const canvas = document.querySelector("#three");
      const camera = new THREE.PerspectiveCamera(
        75,
        window.innerWidth / window.innerHeight,
        0.1,
        1000
      );

      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);

      // add gui to control particle number with function .onchange method
      const gui = new dat.GUI();

      const particles = new THREE.BufferGeometry();
      let count = 1000;
      //  파티클이 생성되는 부분을 함수로 변경함.
      function addParticles() {
        const positions = new Float32Array(count * 3);
        const colors = new Float32Array(count * 3);

        for (let i = 0; i < count * 3; i++) {
          positions[i] = (Math.random() - 0.5) * 100;
          colors[i] = Math.random();
        }
        particles.setAttribute(
          "position",
          new THREE.BufferAttribute(positions, 3)
        );
        particles.setAttribute("color", new THREE.BufferAttribute(colors, 3));
      }
      const particleNumbers = {
        numbers: 1000,
      };

      const particleNum = gui.addFolder("파티클 갯수");

      particleNum
        .add(particleNumbers, "numbers", 1000, 50000)
        .name("생성 파티클 수")
        .onChange((value) => {
          count = value;
          addParticles();
        });
      addParticles();
      const textureLoader = new THREE.TextureLoader();
      const particleTexture = textureLoader.load("./particles/star.png");

      const particleMaterial = new THREE.PointsMaterial({
        size: 3,
        map: particleTexture,
        blending: THREE.AdditiveBlending,
      });

      const particleProps = gui.addFolder("파티클 속성");
      particleProps
        .add(particleMaterial, "size", 1, 5, 0.5)
        .name("크기")
        .onChange(() => {
          particleMaterial.needsUpdate = true;
        });

      particleProps
        .add(particleMaterial, "sizeAttenuation")
        .name("크기 감소")
        .onFinishChange(() => {
          particleMaterial.needsUpdate = true;
        });
      particleProps
        .add(particleMaterial, "vertexColors")
        .name("색상")
        .onFinishChange(() => {
          particleMaterial.needsUpdate = true;
        });
      particleProps
        .add(particleMaterial, "depthTest")
        .name("깊이테스트")
        .onFinishChange(() => {
          particleMaterial.needsUpdate = true;
        });
      particleProps
        .add(particleMaterial, "depthWrite")
        .name("깊이 쓰기 활성화")
        .onFinishChange(() => {
          particleMaterial.needsUpdate = true;
        });
      particleProps
        .add(particleMaterial, "transparent")
        .name("투명처리")
        .onFinishChange(() => {
          particleMaterial.needsUpdate = true;
        });
      particleProps
        .add(particleMaterial, "blending", {
          No: THREE.NoBlending,
          Normal: THREE.NormalBlending,
          Additive: THREE.AdditiveBlending,
          Subtractive: THREE.SubtractiveBlending,
          Multiply: THREE.MultiplyBlending,
          Custom: THREE.CustomBlending,
        })
        .name("블렌딩")
        .onFinishChange(() => {
          particleMaterial.needsUpdate = true;
        });

      const particleSystem = new THREE.Points(particles, particleMaterial);
      scene.add(particleSystem);

      // add orbit control
      const controls = new OrbitControls(camera, renderer.domElement);
      camera.position.set(0, 0, 100);
      controls.update();

      // make animate function and add gui to control the animation
      const animate = () => {
        requestAnimationFrame(animate);
        // particleSystem.rotation.y += 0.005;

        renderer.render(scene, camera);
        // sun.rotation.y += 0.005;
      };
      animate();

      function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      }
      window.addEventListener("resize", onWindowResize);
    </script>
  </body>
</html>
