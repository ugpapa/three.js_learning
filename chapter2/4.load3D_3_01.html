<!-- @format -->

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Three sample</title>
    <style>
      body {
        margin: 0;
        height: 100vh;
        box-sizing: border-box;
      }
      #three {
        width: 100%;
        height: 100vh;
        display: block;
      }
    </style>
  <link rel="stylesheet" href="/three.js_learning/shared/example-nav.css" />
</head>
  <body>
    <canvas id="three"></canvas>
    <script
      defer
      src="https://ga.jspm.io/npm:es-module-shims@1.6.2/dist/es-module-shims.js"
    ></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.147.0/build/three.module.js",
          "three/examples/jsm/": "https://unpkg.com/three@0.147.0/examples/jsm/"
        }
      }
    </script>
    <script type="module">
      /** @format */

      import * as THREE from "three";
      import { OrbitControls } from "three/examples/jsm/controls/OrbitControls";
      import { GLTFLoader } from "three/examples/jsm/loaders/GLTFLoader.js";

      const scene = new THREE.Scene();

      const canvas = document.querySelector("#three");
      const camera = new THREE.PerspectiveCamera(
        75,
        window.innerWidth / window.innerHeight,
        0.1,
        1000
      );

      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setClearColor(0xadd8e6, 1);

      // 새로운 GLTFLoader 인스턴스를 생성
      const loader = new GLTFLoader();

      loader.load(
        "./models/poly_game/scene.gltf",
        (gltf) => {
          // 애니메이션이 있는지 확인
          console.log(gltf.animations.length);
          // 애니메이션이 있다면 애니메이션을 재생
          if (gltf.animations.length) {
            const mixer = new THREE.AnimationMixer(gltf.scene);
            // 모델의 모든 애니메이션 클립을 mixer에 추가
            gltf.animations.forEach((clip) => {
              mixer.clipAction(clip).play();
            });
            // 렌더링 루프
            const clock = new THREE.Clock();
            const tick = () => {
              const delta = clock.getDelta();
              mixer.update(delta);
              renderer.render(scene, camera);
              window.requestAnimationFrame(tick);
            };
            // 이제 mixer를 통해 애니메이션을 재생할 수 있습니다.
            tick();
          }
          
          scene.add(gltf.scene); // 로드된 모델을 씬에 추가
        },
        (xhr) => {
          console.log(`${(xhr.loaded / xhr.total) * 100}% loaded`);
        },
        (error) => {
          console.error(`An error happened: ${error}`);
        }
      );

      // 주광 추가
      const ambientLight = new THREE.AmbientLight(0xffffff, 0.75);
      scene.add(ambientLight);

      const light = new THREE.DirectionalLight(0xffffff, 0.5);
      light.position.set(5, 7, -5);
      scene.add(light);

      camera.position.set(1, 4, 20);

      // const controls = new OrbitControls(camera, renderer.domElement);

      // Set up movement variables
      const movementSpeed = 0.1;
      const movement = {
        forward: false,
        backward: false,
        left: false,
        right: false,
      };

      // 키보드 키 누루기 이벤트
      document.addEventListener("keydown", handleKeyDown);
      document.addEventListener("keyup", handleKeyUp);

      function handleKeyDown(event) {
        // 어떤 키를 누르고 있는지 확인
        switch (event.keyCode) {
          case 87: // W key
          case 38:
            movement.forward = true;
            break;
          case 83: // S key
          case 40:
            movement.backward = true;
            break;
          case 65: // A key
          case 37:
            movement.left = true;
            break;
          case 68: // D key
          case 39:
            movement.right = true;
            break;
        }
      }

      function handleKeyUp(event) {
        // 키보드 키를 누르지 않을 때
        switch (event.keyCode) {
          case 87: // W key
          case 38:
            movement.forward = false;
            break;
          case 83: // S key
          case 40:
            movement.backward = false;
            break;
          case 65: // A key
          case 37:
            movement.left = false;
            break;
          case 68: // D key
          case 39:
            movement.right = false;
            break;
        }
      }

      const clock = new THREE.Clock();

      function animate() {
        requestAnimationFrame(animate);
        const elapsed = clock.getElapsedTime();

        if (movement.forward) {
          camera.position.z -= movementSpeed;
        }
        if (movement.backward) {
          camera.position.z += movementSpeed;
        }
        if (movement.left) {
          camera.position.x -= movementSpeed;
        }
        if (movement.right) {
          camera.position.x += movementSpeed;
        }

        // controls.update();
        renderer.render(scene, camera);
      }

      animate();

      function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      }
      window.addEventListener("resize", onWindowResize);
    </script>
  <script src="/three.js_learning/shared/example-nav.js" data-example-nav="true" data-site-root="/three.js_learning"></script>
</body>
</html>
