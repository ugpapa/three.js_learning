<!-- @format -->

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Three sample</title>
    <style>
      body {
        margin: 0;
        height: 100vh;
        box-sizing: border-box;
      }
      #three {
        width: 100%;
        height: 100vh;
        display: block;
      }
    </style>
  <link rel="stylesheet" href="/three.js_learning/shared/example-nav.css" />
</head>
  <body>
    <canvas id="three"></canvas>
    <script
      defer
      src="https://ga.jspm.io/npm:es-module-shims@1.6.2/dist/es-module-shims.js"
    ></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.147.0/build/three.module.js",
          "three/examples/jsm/": "https://unpkg.com/three@0.147.0/examples/jsm/",
          "lil-gui": "https://unpkg.com/lil-gui@0.16.1/dist/lil-gui.esm.js"
        }
      }
    </script>
    <script type="module">
      /** @format */

      import * as THREE from "three";
      import { OrbitControls } from "three/examples/jsm/controls/OrbitControls";
      import { RGBELoader } from "three/examples/jsm/loaders/RGBELoader.js";
      import * as dat from "lil-gui";

      const scene = new THREE.Scene();
      const canvas = document.querySelector("#three");
      const camera = new THREE.PerspectiveCamera(
        75,
        window.innerWidth / window.innerHeight,
        0.1,
        1000
      );

      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.outputEncoding = THREE.sRGBEncoding;

      const pmremGenerator = new THREE.PMREMGenerator(renderer);
      pmremGenerator.compileEquirectangularShader();

      const gui = new dat.GUI();

      const sphere = new THREE.Mesh(
        new THREE.SphereGeometry(0.6, 64, 64),
        new THREE.MeshStandardMaterial({
          color: 0xffffff,
          metalness: 1,
          roughness: 0,
        })
      );
      sphere.position.x = 1.25;
      scene.add(sphere);

      const cube = new THREE.Mesh(
        new THREE.BoxGeometry(0.9, 0.9, 0.9),
        new THREE.MeshStandardMaterial({
          color: 0xffffff,
          metalness: 0.9,
          roughness: 0.05,
        })
      );
      cube.position.x = -1.25;
      scene.add(cube);

      const floor = new THREE.Mesh(
        new THREE.PlaneGeometry(12, 12),
        new THREE.MeshStandardMaterial({
          color: 0xffffff,
          roughness: 0.8,
          metalness: 0.1,
          side: THREE.DoubleSide,
        })
      );
      floor.rotation.x = Math.PI * -0.5;
      floor.position.y = -1.1;
      scene.add(floor);

      const loader = new RGBELoader();
      loader.load("./textures/gothic_manor_02_4k.hdr", (texture) => {
        const envMap = pmremGenerator.fromEquirectangular(texture).texture;
        scene.environment = envMap;
        scene.background = envMap;

        texture.dispose();
        pmremGenerator.dispose();
      });

      const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
      scene.add(ambientLight);

      const light = new THREE.DirectionalLight(0xffffff, 1);
      light.position.set(3, 5, 2);
      scene.add(light);

      const lightFolder = gui.addFolder("Light");
      lightFolder.add(light.position, "x", -10, 10);
      lightFolder.add(light.position, "y", -10, 10);
      lightFolder.add(light.position, "z", -10, 10);
      lightFolder.add(light, "intensity", 0, 3, 0.1);
      lightFolder.open();

      camera.position.set(0, 1, 4);

      const controls = new OrbitControls(camera, renderer.domElement);

      const clock = new THREE.Clock();

      function animate() {
        requestAnimationFrame(animate);
        const elapsed = clock.getElapsedTime();
        controls.update();
        renderer.render(scene, camera);
      }

      animate();

      function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      }
      window.addEventListener("resize", onWindowResize);
    </script>
  <script src="/three.js_learning/shared/example-nav.js" data-example-nav="true" data-site-root="/three.js_learning"></script>
</body>
</html>
