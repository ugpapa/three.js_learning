<!-- @format -->

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Three sample</title>
    <style>
      body {
        margin: 0;
        height: 100vh;
        box-sizing: border-box;
        overflow: hidden;
        background: linear-gradient(lightblue, navy);
      }

      #three {
        width: 100%;
        height: 100vh;
        display: block;
      }
    </style>
  </head>

  <body>
    <canvas id="three"></canvas>
    <script
      defer
      src="https://ga.jspm.io/npm:es-module-shims@1.6.2/dist/es-module-shims.js"
    ></script>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.147.0/build/three.module.js",
          "three/examples/jsm/": "https://unpkg.com/three@0.147.0/examples/jsm/",
          "lil-gui": "https://unpkg.com/lil-gui@0.16.1/dist/lil-gui.esm.js"
        }
      }
    </script>

    <script type="module">
      /** @format */

      import * as THREE from "three";
      import { OrbitControls } from "three/examples/jsm/controls/OrbitControls";
      import { GLTFLoader } from "three/examples/jsm/loaders/GLTFLoader.js";
      import * as dat from "lil-gui";

      const scene = new THREE.Scene();
      const canvas = document.querySelector("#three");
      const camera = new THREE.PerspectiveCamera(
        75,
        window.innerWidth / window.innerHeight,
        0.1,
        1000
      );

      const renderer = new THREE.WebGLRenderer({
        canvas,
        antialias: true,
        alpha: true,
      });

      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap; // optional, for softer shadows
      renderer.setClearColor(0x000000, 0);
      renderer.setSize(window.innerWidth, window.innerHeight);

      const plane = new THREE.Mesh(
        new THREE.PlaneGeometry(20, 20, 2),
        new THREE.MeshStandardMaterial({
          color: 0xa6a6a6,
          side: THREE.DoubleSide,
          // blending: THREE.MultiplyBlending,
        })
      );

      plane.receiveShadow = true;

      plane.rotation.x = Math.PI * 0.5;
      plane.position.y = -0.001;
      scene.add(plane);

      // 모델 객체를 저장할 변수
      let model1;
      let model2;

      const loader = new GLTFLoader();
      loader.load(
        "./models/shop/scene.gltf",
        (gltf) => {
          model1 = gltf.scene;
          model1.traverse((node) => {
            if (node instanceof THREE.Mesh) {
              node.castShadow = true;
              node.receiveShadow = true;
            }
          });
          scene.add(model1);
          // 모델1에 대한 크기와 위치 변경
          model1.scale.set(0.5, 0.5, 0.5);
          model1.position.set(0, 0, 0);
        },
        (xhr) => {
          console.log(`${(xhr.loaded / xhr.total) * 100}% loaded`);
        },
        (error) => {
          console.error(`An error happened: ${error}`);
        }
      );

      loader.load(
        "./models/cloud/scene.gltf",
        (gltf) => {
          model2 = gltf.scene;
          model2.traverse((node) => {
            if (node instanceof THREE.Mesh) {
              node.castShadow = true;
              node.receiveShadow = true;
            }
          });
          scene.add(model2);
          // 모델2에 대한 크기와 위치 변경
          const setSca = 0.3;
          model2.scale.set(setSca, setSca, setSca);
          model2.position.set(0, 2, 0);
        },
        (xhr) => {
          console.log(`${(xhr.loaded / xhr.total) * 100}% loaded`);
        },
        (error) => {
          console.error(`An error happened: ${error}`);
        }
      );

      //add ambient light
      const ambientLight = new THREE.AmbientLight(0xffffff, 0.75);
      scene.add(ambientLight);

      // add light
      const light = new THREE.DirectionalLight(0xffffff, 1);
      light.position.set(1, 2, 1);
      light.castShadow = true;
      scene.add(light);

      const gui = new dat.GUI();

      const lightFolder = gui.addFolder("Light Position");
      lightFolder.add(light.position, "x", -10, 10);
      lightFolder.add(light.position, "y", -10, 10);
      lightFolder.add(light.position, "z", -10, 10);
      lightFolder.add(light, "intensity", 0, 1);

      const helper = new THREE.DirectionalLightHelper(light, 1);
      scene.add(helper);

      const controls = new OrbitControls(camera, renderer.domElement);

      camera.position.set(2, 2, 2);

      // Set up movement variables
      const movementSpeed = 0.01;
      const movement = {
        forward: false,
        backward: false,
        left: false,
        right: false,
      };

      // Add event listeners for keydown and keyup events
      document.addEventListener("keydown", handleKeyDown);
      document.addEventListener("keyup", handleKeyUp);

      function handleKeyDown(event) {
        // Set movement flags based on which key is pressed
        switch (event.keyCode) {
          case 87: // W key
          case 38:
            movement.forward = true;
            break;
          case 83: // S key
          case 40:
            movement.backward = true;
            break;
          case 65: // A key
          case 37:
            movement.left = true;
            break;
          case 68: // D key
          case 39:
            movement.right = true;
            break;
        }
      }

      function handleKeyUp(event) {
        // Clear movement flags when the corresponding key is released
        switch (event.keyCode) {
          case 87: // W key
          case 38:
            movement.forward = false;
            break;
          case 83: // S key
          case 40:
            movement.backward = false;
            break;
          case 65: // A key
          case 37:
            movement.left = false;
            break;
          case 68: // D key
          case 39:
            movement.right = false;
            break;
        }
      }

      const clock = new THREE.Clock();

      function animate() {
        requestAnimationFrame(animate);

        // if (movement.forward) {
        //   camera.position.z -= movementSpeed;
        // }
        // if (movement.backward) {
        //   camera.position.z += movementSpeed;
        // }
        // if (movement.left) {
        //   camera.position.x -= movementSpeed;
        // }
        // if (movement.right) {
        //   camera.position.x += movementSpeed;
        // }
        const cameraDirection = new THREE.Vector3();
        camera.getWorldDirection(cameraDirection).normalize();

        // Update camera position based on movement flags and camera direction
        if (movement.forward) {
          camera.position.add(cameraDirection.multiplyScalar(movementSpeed));
        }
        if (movement.backward) {
          camera.position.add(cameraDirection.multiplyScalar(-movementSpeed));
        }
        if (movement.left) {
          camera.position.add(
            cameraDirection.cross(camera.up).multiplyScalar(-movementSpeed)
          );
        }
        if (movement.right) {
          camera.position.add(
            cameraDirection.cross(camera.up).multiplyScalar(movementSpeed)
          );
        }

        controls.update();
        renderer.render(scene, camera);
        // console.log(camera.position);
      }

      animate();

      function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      }
      window.addEventListener("resize", onWindowResize);
    </script>
  </body>
</html>
