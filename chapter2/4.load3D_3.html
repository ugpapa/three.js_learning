<!-- @format -->

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Three sample</title>
    <style>
      body {
        margin: 0;
        height: 100vh;
        box-sizing: border-box;
      }
      #three {
        width: 100%;
        height: 100vh;
        display: block;
      }
    </style>
  </head>
  <body>
    <canvas id="three"></canvas>
    <script
      defer
      src="https://ga.jspm.io/npm:es-module-shims@1.6.2/dist/es-module-shims.js"
    ></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.147.0/build/three.module.js",
          "three/examples/jsm/": "https://unpkg.com/three@0.147.0/examples/jsm/"
        }
      }
    </script>
    <script type="module">
      /** @format */

      import * as THREE from "three";
      import { OrbitControls } from "three/examples/jsm/controls/OrbitControls";
      import { GLTFLoader } from "three/examples/jsm/loaders/GLTFLoader.js";

      const scene = new THREE.Scene();

      const canvas = document.querySelector("#three");
      const camera = new THREE.PerspectiveCamera(
        75,
        window.innerWidth / window.innerHeight,
        0.1,
        1000
      );

      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setClearColor(0xadd8e6, 1);

      // 새로운 GLTFLoader 인스턴스를 생성
      const loader = new GLTFLoader();

      loader.load(
        "./models/poly_game/scene.gltf",
        (gltf) => {
          // 애니메이션이 있는지 확인
          console.log(gltf.animations.length);            
          if (gltf.animations && gltf.animations.length) {            
            // AnimationMixer 인스턴스 생성
            const mixer = new THREE.AnimationMixer(gltf.scene);
            // 모델의 모든 애니메이션 클립을 mixer에 추가
            for (let i = 0; i < gltf.animations.length; i++) {
              const animation = gltf.animations[i];   
              mixer.clipAction(animation).play();
            }

            // rendering loop
            const clock = new THREE.Clock();
            function modelAnimate() {
              requestAnimationFrame(modelAnimate);
              // mixer를 업데이트하여 애니메이션 프레임을 전진
              const delta = clock.getDelta();
              mixer.update(delta * 3);
            }
            modelAnimate();
          }
          scene.add(gltf.scene); // 로드된 모델을 씬에 추가
        },
        (xhr) => {
          console.log(`${(xhr.loaded / xhr.total) * 100}% loaded`);
        },
        (error) => {
          console.error(`An error happened: ${error}`);
        }
      );

      // 주광 추가
      const ambientLight = new THREE.AmbientLight(0xffffff, 0.75);
      scene.add(ambientLight);

      const light = new THREE.DirectionalLight(0xffffff, 0.5);
      light.position.set(5, 7, -5);
      scene.add(light);

      camera.position.set(10, 10, 10);

      const controls = new OrbitControls(camera, renderer.domElement);

      const clock = new THREE.Clock();

      function animate() {
        requestAnimationFrame(animate);
        const elapsed = clock.getElapsedTime();
        controls.update();
        renderer.render(scene, camera);
      }

      animate();

      function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      }
      window.addEventListener("resize", onWindowResize);
    </script>
  </body>
</html>
