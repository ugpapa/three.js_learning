<!-- @format -->

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Three sample</title>
    <style>
      body {
        margin: 0;
        height: 100vh;
        box-sizing: border-box;
      }
      #three {
        width: 100%;
        height: 100vh;
        display: block;
      }
    </style>
  </head>
  <body>
    <canvas id="three"></canvas>
    <script
      defer
      src="https://ga.jspm.io/npm:es-module-shims@1.6.2/dist/es-module-shims.js"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.11.4/dist/gsap.js"></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.147.0/build/three.module.js",
          "three/examples/jsm/": "https://unpkg.com/three@0.147.0/examples/jsm/",
          "lil-gui": "https://unpkg.com/lil-gui@0.16.1/dist/lil-gui.esm.js"
        }
      }
    </script>
    <script type="module">
      import * as THREE from "three";
      import { OrbitControls } from "three/examples/jsm/controls/OrbitControls";
      import * as dat from "lil-gui";
      import { ImprovedNoise } from "three/examples/jsm/math/ImprovedNoise";
      /**
       * Base
       */
      // Debug
      const gui = new dat.GUI();
      const debugObject = {};

      // Canvas
      const scene = new THREE.Scene();
      // scene.background = new THREE.Color(0xff0000);
      const canvas = document.querySelector("#three");
      const camera = new THREE.PerspectiveCamera(
        75,
        window.innerWidth / window.innerHeight,
        0.1,
        1000
      );

      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);

      camera.position.set(0.123, -5, -0.14);
      scene.add(camera);

      window.addEventListener("resize", () => {
        // Update sizes
        sizes.width = window.innerWidth;
        sizes.height = window.innerHeight;

        // Update camera
        camera.aspect = sizes.width / sizes.height;
        camera.updateProjectionMatrix();

        // Update renderer
        renderer.setSize(sizes.width, sizes.height);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      });

      //Controls
      const controls = new OrbitControls(camera, canvas);
      controls.enableDamping = true;

      const particlesCount = 5000;
      const particlesGeometry = new THREE.BufferGeometry();

      const particlesMaterial = new THREE.PointsMaterial({
        size: 0.01,
        vertexColors: true,
        transparent: true,
        opacity: 0.9,
      });

      const positions = [];
      const colors = [];

      const fixedOrigin = { x: 0, y: -2, z: 0 }; // 고정된 시작점을 정의합니다.

      for (let i = 0; i < particlesCount; i++) {
        const radius = Math.random() * 0.1; // 반지름 값을 1에서 0.1로 줄입니다.
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.random() * Math.PI;

        const x = fixedOrigin.x + radius * Math.sin(phi) * Math.cos(theta);
        const y = fixedOrigin.y + radius * Math.sin(phi) * Math.sin(theta);
        const z = fixedOrigin.z + radius * Math.cos(phi);

        positions.push(x, y, z);

        const color = new THREE.Color();
        color.setHSL(0.6 - 0.1 * Math.random(), 1, 0.3 + 0.4 * Math.random());
        colors.push(color.r, color.g, color.b);
        // console.log(color);
      }

      const velocities = [];

      for (let i = 0; i < particlesCount; i++) {
        const speed = 0.03 + Math.random() * 0.05; // 속도를 0.01 ~ 0.03에서 0.03 ~ 0.08로 높입니다.
        const angle = Math.random() * Math.PI * 2;
        const vx = Math.cos(angle) * speed;
        const vy = Math.sin(angle) * speed;

        velocities.push(vx, vy);
      }

      particlesGeometry.setAttribute(
        "position",
        new THREE.Float32BufferAttribute(positions, 3)
      );

      particlesGeometry.setAttribute(
        "color",
        new THREE.Float32BufferAttribute(colors, 3)
      );

      const particles = new THREE.Points(particlesGeometry, particlesMaterial);
      scene.add(particles);

      const noise = new ImprovedNoise();

      function animate(time) {
        time = 1000; // Convert time to seconds

        // Update particles positions using Perlin noise
        for (let i = 0; i < particles.geometry.attributes.position.count; i++) {
          const px = particles.geometry.attributes.position.array[i * 3];
          const py = particles.geometry.attributes.position.array[i * 3 + 1];
          const pz = particles.geometry.attributes.position.array[i * 3 + 2];

          const nx = px + 0.1 * noise.noise(px, py, time);
          const ny = py + 0.1 * noise.noise(py, pz, time) + 0.05;
          const nz = pz + 0.1 * noise.noise(pz, px, time);

          particles.geometry.attributes.position.array[i * 3] +=
            velocities[i * 2];
          particles.geometry.attributes.position.array[i * 3 + 1] +=
            velocities[i * 2 + 1];
          particles.geometry.attributes.position.array[i * 3 + 2] +=
            0.01 * noise.noise(pz, px, time);

          if (ny > 8) {
            const radius = Math.random() * 1;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.random() * Math.PI;

            particles.geometry.attributes.position.array[i * 3] =
              fixedOrigin.x + radius * Math.sin(phi) * Math.cos(theta);
            particles.geometry.attributes.position.array[i * 3 + 1] =
              fixedOrigin.y + radius * Math.sin(phi) * Math.sin(theta);
            particles.geometry.attributes.position.array[i * 3 + 2] =
              fixedOrigin.z + radius * Math.cos(phi);

            const speed = 0.01 + Math.random() * 0.02;
            const angle = Math.random() * Math.PI * 2;
            velocities[i * 2] = Math.cos(angle) * speed;
            velocities[i * 2 + 1] = Math.sin(angle) * speed;
          }
        }

        particles.geometry.attributes.position.needsUpdate = true;

        renderer.render(scene, camera);
        controls.update();

        requestAnimationFrame(animate);

        // console.log(camera.position);
      }

      animate(0);

      function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      }
      window.addEventListener("resize", onWindowResize);
    </script>
  </body>
</html>
