<!-- @format -->

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Three sample</title>
    <style>
      body {
        margin: 0;
        height: 100vh;
        box-sizing: border-box;
      }
      #three {
        width: 100%;
        height: 100vh;
        display: block;
      }
    </style>
  </head>
  <body>
    <canvas id="three"></canvas>
    <script
      defer
      src="https://ga.jspm.io/npm:es-module-shims@1.6.2/dist/es-module-shims.js"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.11.4/dist/gsap.js"></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.147.0/build/three.module.js",
          "three/examples/jsm/": "https://unpkg.com/three@0.147.0/examples/jsm/"
        }
      }
    </script>
    <script type="module">
      /** @format */

      import * as THREE from "three";
      import { OrbitControls } from "three/examples/jsm/controls/OrbitControls";

      const scene = new THREE.Scene();
      const canvas = document.querySelector("#three");
      const camera = new THREE.PerspectiveCamera(
        75,
        window.innerWidth / window.innerHeight,
        0.1,
        1000
      );

      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);

      const geometry = new THREE.BufferGeometry();

      const vertices = new Float32Array([
         0.0, 1.0, 0.0,    // v0
       -0.951, 0.309, 0.0,  // v1 
       -0.588, -0.809, 0.0,  //v2
        0.588, -0.809, 0.0,  //v3   
        0.951, 0.309, 0.0,  //v4
      ]);

      // 인다이스 데이터 생성
      const indices = new Uint32Array([
        0, 1, 2, //첫번째 삼각형
        0, 2, 3, // 두번째 삼각형
        0, 3, 4 // 세번째 삼각형
    ]); 
      geometry.setIndex(new THREE.BufferAttribute(indices, 1));

      geometry.setAttribute("position", new THREE.BufferAttribute(vertices, 3));

      const material = new THREE.MeshBasicMaterial({
        color: 0xff0000,
        side: THREE.DoubleSide,
      });
      const mesh = new THREE.Mesh(geometry, material);

      scene.add(mesh);

      camera.position.set(1, 1, 3);

      const controls = new OrbitControls(camera, renderer.domElement);

      const clock = new THREE.Clock();

      function animate() {
        requestAnimationFrame(animate);
        const elapsed = clock.getElapsedTime();

        // mesh.rotation.y += 0.01;

        // particleGeometry.attributes.position.needsUpdate = true;

        controls.update();
        renderer.render(scene, camera);
      }

      animate();

      function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      }
      window.addEventListener("resize", onWindowResize);
    </script>
  </body>
</html>
