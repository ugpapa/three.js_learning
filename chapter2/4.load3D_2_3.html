<!-- @format -->

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Three sample</title>
    <style>
      body {
        margin: 0;
        height: 100vh;
        box-sizing: border-box;
        overflow: hidden;
        background: linear-gradient(lightblue, navy);
      }

      #three {
        width: 100%;
        height: 100vh;
        display: block;
      }
    </style>
  <link rel="stylesheet" href="/three.js_learning/shared/example-nav.css" />
</head>

  <body>
    <canvas id="three"></canvas>
    <script
      defer
      src="https://ga.jspm.io/npm:es-module-shims@1.6.2/dist/es-module-shims.js"
    ></script>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.147.0/build/three.module.js",
          "three/examples/jsm/": "https://unpkg.com/three@0.147.0/examples/jsm/"
        }
      }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>

    <script type="module">
      /** @format */

      import * as THREE from "three";
      import { OrbitControls } from "three/examples/jsm/controls/OrbitControls";
      import { GLTFLoader } from "three/examples/jsm/loaders/GLTFLoader.js";

      const scene = new THREE.Scene();
      const canvas = document.querySelector("#three");
      const camera = new THREE.PerspectiveCamera(
        75,
        window.innerWidth / window.innerHeight,
        0.1,
        1000
      );

      const renderer = new THREE.WebGLRenderer({
        canvas,
        antialias: true,
        alpha: true,
      });

      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap; // optional, for softer shadows
      renderer.setClearColor(0x000000, 0);
      renderer.setSize(window.innerWidth, window.innerHeight);

      const plane = new THREE.Mesh(
        new THREE.PlaneGeometry(20, 20, 20),
        new THREE.MeshStandardMaterial({
          color: "gray",
          side: THREE.DoubleSide,
          blending: THREE.MultiplyBlending,
        })
      );

      plane.receiveShadow = true;

      plane.rotation.x = Math.PI * 0.5;
      plane.position.y = 0;
      // scene.add(plane);

      // 모델 객체를 저장할 변수
      let model1;
      let model2;

      const loader = new GLTFLoader();
      loader.load(
        "./models/shop/scene.gltf",
        function (gltf) {
          model1 = gltf.scene;
          model1.traverse(function (node) {
            if (node instanceof THREE.Mesh) {
              node.castShadow = true;
              node.receiveShadow = true;
            }
          });
          scene.add(model1);
          // 모델1에 대한 크기와 위치 변경
          model1.scale.set(0.5, 0.5, 0.5);
          model1.position.set(0, 0, 0);
        },
        function (xhr) {
          console.log((xhr.loaded / xhr.total) * 100 + "% loaded");
        },
        function (error) {
          console.error("An error happened", error);
        }
      );

      loader.load(
        "./models/cloud/scene.gltf",
        function (gltf) {
          model2 = gltf.scene;
          scene.add(model2);
          model2.scale.set(0.25, 0.25, 0.25);
          model2.position.set(0, 2, 0);
        },
        function (xhr) {
          console.log((xhr.loaded / xhr.total) * 100 + "% loaded");
        },
        function (error) {
          console.error("An error happened", error);
        }
      );

      //add ambient light
      const ambientLight = new THREE.AmbientLight(0xffffff, 0.75);
      scene.add(ambientLight);

      // add light
      const light = new THREE.DirectionalLight(0xffffff, 1);
      light.position.set(1, 1, 1);
      light.castShadow = true; // Enable shadow casting by the light
      scene.add(light);

      const controls = new OrbitControls(camera, renderer.domElement);
      camera.position.set(0.8, 2, 3);

      const clock = new THREE.Clock();

      function animateCamera() {
        // Add camera to a group so we can move the camera
        // around the object by rotating the group
        const boom = new THREE.Group();
        boom.add(camera);
        scene.add(boom);
        controls?.target?.set(0, 0.1, 0);
        camera.position.set(0.8, 2, 3);
        // Move camera closer to object's left side
        gsap.to(camera.position, {
          duration: 1,
          x: -1,
          y: 0.3,
          z: 0,
          ease: "none",
          onComplete: function () {
            // Rotate camera up to see the entire building
            gsap.to(controls.target, {
              duration: 3,
              x: 0,
              y: 0.5,
              z: 0,
              ease: "power1.easeIn",
            });

            // Rotate camera around object
            gsap.to(boom.rotation, {
              duration: 2,
              y: -Math.PI * 1.3,
              ease: "none",

              // Move camera back further from object
              onComplete: function () {
                gsap.to(boom.position, {
                  duration: 3,
                  x: 0.6,
                  y: 1.6,
                  z: 1.8,
                  ease: "power2.easeOut",

                });
              },
            });
          },
        });
      }

      // Call the function to start the animation loop
      animateCamera();

      function animate() {
        requestAnimationFrame(animate);
        const elapsed = clock.getElapsedTime();

        controls.update();
        renderer.render(scene, camera);
        // console.log(camera.position);
      }
      animate();

      function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      }
      window.addEventListener("resize", onWindowResize);
    </script>
  <script src="/three.js_learning/shared/example-nav.js" data-example-nav="true" data-site-root="/three.js_learning"></script>
</body>
</html>
