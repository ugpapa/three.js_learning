<!-- @format -->

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Three sample</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100vh;
        overflow: hidden;
      }
      canvas {
        width: 100%;
        height: 100%;
      }
    </style>
  <link rel="stylesheet" href="/three.js_learning/shared/example-nav.css" />
</head>
  <body>
    <canvas id="three"></canvas>
    <script
      defer
      src="https://ga.jspm.io/npm:es-module-shims@1.6.2/dist/es-module-shims.js"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.11.4/dist/gsap.js"></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.147.0/build/three.module.js",
          "three/examples/jsm/": "https://unpkg.com/three@0.147.0/examples/jsm/",
          "lil-gui": "https://unpkg.com/lil-gui@0.16.1/dist/lil-gui.esm.js"
        }
      }
    </script>
    <script type="module">
      import * as THREE from "three";
      import Stats from "three/examples/jsm/libs/stats.module";
      import { OrbitControls } from "three/examples/jsm/controls/OrbitControls";
      import * as dat from "lil-gui";

      const scene = new THREE.Scene();
      const canvas = document.querySelector("#three");
      const camera = new THREE.PerspectiveCamera(
        75,
        window.innerWidth / window.innerHeight,
        0.1,
        1000
      );

      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;

      const gui = new dat.GUI();

      const ballGeometry = new THREE.SphereGeometry(0.25, 32, 16);
      const ballMaterial = new THREE.MeshPhongMaterial({
        color: "lightblue",
        // wireframe: true,
      });
      const ball = new THREE.Mesh(ballGeometry, ballMaterial);
      ball.position.set(0, 3, 0);
      ball.castShadow = true; //default is false
      ball.receiveShadow = false; //default
      scene.add(ball);

      let flatGeometry = new THREE.PlaneGeometry(5, 5);
      const flatMaterial = new THREE.MeshStandardMaterial({
        color: "blue",
        side: THREE.DoubleSide,
      });
      const flatMesh = new THREE.Mesh(flatGeometry, flatMaterial);
      flatMesh.position.set(0, 0, 0);
      flatMesh.rotation.x = Math.PI / 2;
      flatMesh.receiveShadow = true;
      scene.add(flatMesh);
      const params = {
        size: 5,
      };

      const updateSize = () => {
        const { size } = params;
        const widthSegments = 1; // 평면의 가로 세그먼트 수
        const heightSegments = 1; // 평면의 세로 세그먼트 수

        flatGeometry.dispose(); // 이전 geometry 삭제

        flatGeometry = new THREE.PlaneGeometry(
          size,
          size,
          widthSegments,
          heightSegments
        );
        flatMesh.geometry = flatGeometry;
      };

      gui
        .add(params, "size", 1, 10)
        .name("바닥 크기")
        .onChange(() => {
          updateSize();
        });

      camera.position.set(5, 5, 5);

      const ballControls = {
        ballZ: {
          size: 2,
          color: "#ffffff",
        },
      };
      gui
        .add(ballControls.ballZ, "size", 2, 5, 0.5)
        .name("공크기")
        .onChange(() => {
          ball.scale.set(
            ballControls.ballZ.size,
            ballControls.ballZ.size,
            ballControls.ballZ.size
          );
        });

      gui
        .addColor(ballControls.ballZ, "color")
        .name("공컬러")
        .onChange(() => {
          ballMaterial.color.set(ballControls.ballZ.color);
        });

      const ambientLight = new THREE.AmbientLight(0xffffff, 0.75);
      scene.add(ambientLight);

      const light = new THREE.DirectionalLight(0xffffff, 0.5);
      light.position.set(5, 5, 0);
      light.castShadow = true;
      scene.add(light);

      const controls = new OrbitControls(camera, renderer.domElement);

      const stats = Stats();
      document.body.appendChild(stats.dom);

      const tl = gsap.timeline();
      tl.to(ball.position, {
        duration: 1,
        ease: "power1.in",
        y: 0.25,
      })
        .to(ball.position, {
          duration: 1.25,
          ease: "power1.out",
          y: 3,
        })

        .repeat(-1);

      function animate() {
        controls.update();
        requestAnimationFrame(animate);
        renderer.render(scene, camera);
        stats.update();
      }

      animate();

      function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      }

      window.addEventListener("resize", onWindowResize);
    </script>
  <script src="/three.js_learning/shared/example-nav.js" data-example-nav="true" data-site-root="/three.js_learning"></script>
</body>
</html>
